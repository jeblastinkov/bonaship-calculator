<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bonaship | A/B/C router</title>
</head>
<body>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var chosen = (params.get("v") || "").toLowerCase();
      var valid = ["a", "b", "c"];
      var variant = valid.includes(chosen)
        ? chosen
        : valid[Math.floor(Math.random() * valid.length)];

      var target = "landing-" + variant + ".html";
      window.location.replace(target);
    })();
  </script>
</body>
</html>
